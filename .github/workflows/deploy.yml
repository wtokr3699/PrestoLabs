name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Create firebase-config.js from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          python3 -c "
          import os
          content = '''export const firebaseConfig = {
            apiKey: \"''' + os.environ['FIREBASE_API_KEY'] + '''\",
            authDomain: \"prestolabs-753ec.firebaseapp.com\",
            projectId: \"prestolabs-753ec\",
            storageBucket: \"prestolabs-753ec.firebasestorage.app\",
            messagingSenderId: \"884774009430\",
            appId: \"''' + os.environ['FIREBASE_APP_ID'] + '''\",
            measurementId: \"''' + os.environ['FIREBASE_MEASUREMENT_ID'] + '''\",
          };
          '''
          open('firebase-config.js', 'w').write(content)
          print('firebase-config.js created')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
